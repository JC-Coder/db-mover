<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">DB Mover — database migration without the command-line friction</title>
  <desc id="description">Social sharing banner for the open-source DB Mover application.</desc>
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1050 40) rotate(133) scale(580 590)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C98A3D" stop-opacity=".22"/>
      <stop offset="1" stop-color="#080504" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="884" y1="118" x2="1112" y2="478" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7B84B"/>
      <stop offset=".5" stop-color="#E8A23A"/>
      <stop offset="1" stop-color="#C98225"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".48"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="40" fill="#080504"/>
  <rect width="1200" height="630" rx="40" fill="url(#glow)"/>
  <path d="M0 1h1200v628H0z" fill="none" stroke="#2A1D16" stroke-width="2"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(76 72)">
      <rect width="54" height="54" rx="14" fill="#C98A3D"/>
      <g transform="translate(8 8) scale(.075)">
        <path d="M122 156v139c0 28 45 51 102 51 24 0 47-4 65-11M326 156v78M122 218c0 28 45 51 102 51 33 0 63-8 82-20M122 281c0 28 45 51 102 51 11 0 22-1 32-3M172 392c58 0 72-90 136-90h91m-32-32 35 32-35 32M172 431c72 0 86-89 153-89h74m-32-32 35 32-35 32" fill="none" stroke="#120B07" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
        <ellipse cx="224" cy="156" rx="102" ry="45" fill="#120B07"/>
      </g>
      <text x="72" y="39" fill="#F5EFE8" font-size="31" font-weight="750" letter-spacing="-.8">DB Mover</text>
    </g>

    <text x="76" y="252" fill="#F5EFE8" font-size="67" font-weight="780" letter-spacing="-2.5">
      <tspan x="76" dy="0">Move databases.</tspan>
      <tspan x="76" dy="82">Skip the CLI maze.</tspan>
    </text>
    <text x="78" y="450" fill="#D8C8B8" font-size="27" font-weight="450">
      <tspan x="78" dy="0">Open-source migrations and backups for MongoDB,</tspan>
      <tspan x="78" dy="40">PostgreSQL, MySQL, and Redis.</tspan>
    </text>

    <g transform="translate(78 540)">
      <rect width="282" height="46" rx="23" fill="#C98A3D"/>
      <text x="141" y="31" fill="#120B07" font-size="18" font-weight="700" text-anchor="middle">Free · Open source · No signup</text>
    </g>
  </g>

  <g transform="translate(828 72)" filter="url(#shadow)">
    <rect width="296" height="486" rx="62" fill="#0D0A08" stroke="#342218" stroke-width="2"/>
    <g transform="translate(-60 -24) scale(.82)" fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="224" cy="156" rx="102" ry="45" fill="url(#gold)" stroke-width="12"/>
      <path d="M122 156v139c0 28 45 51 102 51 24 0 47-4 65-11M326 156v78M122 218c0 28 45 51 102 51 33 0 63-8 82-20M122 281c0 28 45 51 102 51 11 0 22-1 32-3" stroke-width="12"/>
      <path d="M172 392c58 0 72-90 136-90h91m-32-32 35 32-35 32M172 431c72 0 86-89 153-89h74m-32-32 35 32-35 32" stroke-width="20"/>
    </g>
  </g>
</svg>
